name: Weekly Operating Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1" # Every Monday 13:00 UTC
  pull_request:
    paths:
      - "tests/fixtures/weekly_operating/**/*.json"
      - "scripts/governance/weekly_operating_audit.py"
      - "scripts/governance/weekly_pnl_attribution.py"
      - "scripts/governance/weekly_canary_checklist.py"
      - "scripts/governance/weekly_decision_log.py"
      - "scripts/governance/weekly_manual_status_prefill.py"
      - "scripts/governance/weekly_signoff_pack.py"
      - "scripts/governance/live_deviation_snapshot.py"
      - "scripts/governance/online_offline_consistency_replay.py"
      - "scripts/governance/algorithm_performance_baseline.py"
      - "scripts/performance/latency_benchmark.py"
      - "config/weekly_operating_thresholds.json"
      - "config/consistency_thresholds.json"
      - "config/online_offline_consistency_thresholds.json"
      - "tests/fixtures/live_deviation/**/*.csv"
      - "docs/plans/weekly-operating-checklist.md"
      - ".github/workflows/weekly-operating-audit.yml"

jobs:
  weekly-operating-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run weekly operating audit pipeline
        run: |
          make weekly-operating-audit ADR_OWNER="weekly-ci"

      - name: Publish report to job summary
        if: always()
        run: |
          if [ -f artifacts/weekly-operating-audit.md ]; then
            cat artifacts/weekly-operating-audit.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Weekly operating audit report not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/weekly-canary-checklist.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/weekly-canary-checklist.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/weekly-decision-log.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/weekly-decision-log.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/weekly-signoff-pack.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/weekly-signoff-pack.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-operating-audit-report
          path: |
            artifacts/algorithm-performance-baseline.md
            artifacts/algorithm-performance-baseline.json
            artifacts/performance/latency_benchmark_report.md
            artifacts/performance/latency_benchmark_report.json
            artifacts/weekly-operating-audit.md
            artifacts/weekly-operating-audit.json
            artifacts/weekly-pnl-attribution.md
            artifacts/weekly-pnl-attribution.json
            artifacts/weekly-canary-checklist.md
            artifacts/weekly-canary-checklist.json
            artifacts/weekly-adr-draft.md
            artifacts/weekly-decision-log.md
            artifacts/weekly-decision-log.json
            artifacts/weekly-manual-status.md
            artifacts/weekly-signoff-pack.md
            artifacts/weekly-signoff-pack.json
            artifacts/weekly-manual-status.json
            artifacts/live-deviation-snapshot.md
            artifacts/live-deviation-snapshot.json
            artifacts/online-offline-consistency-replay.md
            artifacts/online-offline-consistency-replay.json
